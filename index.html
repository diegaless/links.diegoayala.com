<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Indice de paginas y proyectos del dominio de Diego Ayala."
    >
    <title>Indice del dominio | Diego Ayala</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <script>
      const savedTheme = localStorage.getItem("theme");
      document.documentElement.dataset.theme = savedTheme || "light";
    </script>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-name" href="./" aria-label="Inicio">Diego Ayala</a>
      <button
        class="theme-toggle"
        type="button"
        data-theme-toggle
        aria-label="Activar modo oscuro"
        title="Cambiar tema"
      >
        <svg class="theme-icon theme-icon-moon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20.4 15.8A8.5 8.5 0 0 1 8.2 3.6 8.5 8.5 0 1 0 20.4 15.8z"></path>
        </svg>
        <svg class="theme-icon theme-icon-sun" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93 6.34 6.34"></path>
          <path d="M17.66 17.66 19.07 19.07"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66 4.93 19.07"></path>
          <path d="M19.07 4.93 17.66 6.34"></path>
        </svg>
      </button>
    </header>

    <main class="page-main" aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">Indice de paginas del dominio</h1>

      <nav aria-label="Paginas del dominio">
        <ul class="domain-list">
          <li>
            <a
              class="domain-link"
              href="https://diegoayala.com/"
              target="_blank"
              rel="noreferrer"
            >
              <span>Home</span>
              <i aria-hidden="true"></i>
            </a>
          </li>

          <li>
            <a
              class="domain-link"
              href="https://slides.diegoayala.com/"
              target="_blank"
              rel="noreferrer"
            >
              <span>Slides</span>
              <i aria-hidden="true"></i>
            </a>
          </li>

          <li>
            <a
              class="domain-link"
              href="https://ojitos.diegoayala.com/"
              target="_blank"
              rel="noreferrer"
            >
              <span>Ojitos</span>
              <i aria-hidden="true"></i>
            </a>
          </li>
        </ul>
      </nav>
    </main>

    <footer class="site-footer">
      <a href="https://github.com/diegaless" target="_blank" rel="noreferrer">GitHub</a>
      <span aria-hidden="true"></span>
      <a href="https://www.linkedin.com/in/diego-ayala/" target="_blank" rel="noreferrer">LinkedIn</a>
      <span aria-hidden="true"></span>
      <a href="mailto:diego.ayala.bernal2@gmail.com">Contacto</a>
    </footer>
  </body>
</html>
